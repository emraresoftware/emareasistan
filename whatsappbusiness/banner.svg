<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" width="1640" height="624">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0d2a27"/>
      <stop offset="100%" stop-color="#0a1a18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b8a6"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a36"/>
      <stop offset="100%" stop-color="#162e2b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Arka plan -->
  <rect width="1640" height="624" fill="url(#bg)"/>

  <!-- Dekoratif halkalar -->
  <circle cx="1480" cy="312" r="380" fill="#10b8a6" fill-opacity="0.04"/>
  <circle cx="1480" cy="312" r="260" fill="#10b8a6" fill-opacity="0.05"/>
  <circle cx="160" cy="620" r="300" fill="#059669" fill-opacity="0.04"/>

  <!-- Sol içerik -->
  <!-- EA Logo badge -->
  <rect x="80" y="80" width="72" height="72" rx="20" fill="url(#accent)"/>
  <text x="116" y="130" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="32" fill="white" text-anchor="middle">EA</text>

  <!-- Marka adı -->
  <text x="170" y="107" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="28" fill="white">Emare</text>
  <text x="170" y="139" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="28" fill="#10b8a6">Asistan</text>

  <!-- Ana başlık -->
  <text x="80" y="240" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="-1">7/24 Akıllı</text>
  <text x="80" y="316" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="64" fill="url(#accent)" letter-spacing="-1">Müşteri Asistanı</text>

  <!-- Alt açıklama -->
  <text x="80" y="380" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="26" fill="#94a3b8">WhatsApp · Telegram · Web — Tek Panelden Yönet</text>

  <!-- Feature tag'ler -->
  <rect x="80" y="420" width="168" height="44" rx="22" fill="#10b8a6" fill-opacity="0.15"/>
  <text x="164" y="448" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="18" fill="#10b8a6" text-anchor="middle">● AI Sohbet</text>

  <rect x="264" y="420" width="192" height="44" rx="22" fill="#059669" fill-opacity="0.15"/>
  <text x="360" y="448" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="18" fill="#34d399" text-anchor="middle">● Sipariş Takip</text>

  <rect x="472" y="420" width="188" height="44" rx="22" fill="#6366f1" fill-opacity="0.15"/>
  <text x="566" y="448" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="18" fill="#818cf8" text-anchor="middle">● Randevu</text>

  <!-- Alt domain -->
  <text x="80" y="556" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="22" fill="#475569">asistan.emarecloud.tr</text>

  <!-- Sağ taraf — chat mockup -->
  <rect x="960" y="60" width="600" height="504" rx="28" fill="url(#cardBg)" stroke="#10b8a6" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Chat header -->
  <rect x="960" y="60" width="600" height="72" rx="28" fill="#1a3330"/>
  <rect x="960" y="104" width="600" height="28" fill="#1a3330"/>
  <circle cx="1012" cy="96" r="24" fill="#10b8a6" fill-opacity="0.2"/>
  <text x="1012" y="104" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="16" fill="#10b8a6" text-anchor="middle">EA</text>
  <text x="1044" y="89" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="18" fill="white">Emare Asistan</text>
  <text x="1044" y="110" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#10b8a6">● Çevrimiçi</text>

  <!-- Chat mesajları -->
  <!-- Kullanıcı mesajı 1 -->
  <rect x="1100" y="156" width="420" height="56" rx="16" fill="#10b8a6" fill-opacity="0.2"/>
  <text x="1310" y="178" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Siparişim ne zaman gelecek?</text>
  <text x="1490" y="200" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="end">14:32 ✓✓</text>

  <!-- Bot cevabı 1 -->
  <rect x="976" y="228" width="380" height="96" rx="16" fill="#1e3a36" stroke="#10b8a6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="996" y="254" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="white">📦 Siparişiniz yolda!</text>
  <text x="996" y="278" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#94a3b8">Kargo No: TK384920</text>
  <text x="996" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#34d399">Tahmini: Yarın 14:00–18:00 arası</text>
  <text x="986" y="318" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#64748b">14:32</text>

  <!-- Kullanıcı mesajı 2 -->
  <rect x="1136" y="344" width="384" height="44" rx="14" fill="#10b8a6" fill-opacity="0.2"/>
  <text x="1328" y="372" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">İade nasıl yapabilirim?</text>
  <text x="1490" y="382" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="end">14:33 ✓✓</text>

  <!-- Bot cevabı 2 -->
  <rect x="976" y="404" width="340" height="80" rx="14" fill="#1e3a36" stroke="#10b8a6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="996" y="428" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="white">🔄 İade işleminizi</text>
  <text x="996" y="450" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#94a3b8">hemen başlatalım.</text>
  <text x="996" y="472" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#34d399">Sipariş numaranızı paylaşır mısınız?</text>

  <!-- Input bar -->
  <rect x="976" y="512" width="568" height="44" rx="22" fill="#0f2420"/>
  <text x="1060" y="540" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#475569">Mesaj yazın...</text>
  <circle cx="1516" cy="534" r="18" fill="url(#accent)"/>
  <text x="1516" y="541" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">↑</text>
</svg>