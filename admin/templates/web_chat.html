<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ tenant.name }} - Sohbet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Plus Jakarta Sans',system-ui,sans-serif; background:#f1f5f9; color:#0f172a; min-height:100vh; display:flex; flex-direction:column; }
    .chat-header { background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%); color:#fff; padding:1rem 1.25rem; font-weight:600; font-size:1rem; }
    .chat-messages { flex:1; overflow-y:auto; padding:1rem 1.25rem; min-height:200px; max-height:calc(100vh - 180px); }
    .chat-msg { margin-bottom:1rem; max-width:88%; }
    .chat-msg.user { margin-left:auto; margin-right:0; background:linear-gradient(135deg,#0f172a,#1e293b); color:#fff; padding:0.85rem 1.1rem; border-radius:16px 16px 4px 16px; font-size:0.95rem; }
    .chat-msg.assistant { margin-left:0; margin-right:auto; background:#fff; padding:0.85rem 1.1rem; border-radius:16px 16px 16px 4px; box-shadow:0 2px 8px rgba(0,0,0,0.06); font-size:0.95rem; border:1px solid #e2e8f0; }
    .chat-msg .product-img { margin:0.5rem 0; border-radius:10px; overflow:hidden; max-width:220px; }
    .chat-msg .product-img img { width:100%; display:block; }
    .chat-msg .product-img .caption { padding:0.4rem 0.5rem; font-size:0.8rem; color:#64748b; background:#f8fafc; }
    .chat-msg .suggest-replies { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.75rem; }
    .chat-msg .suggest-replies button { padding:0.4rem 0.75rem; font-size:0.8rem; border:1px solid #e2e8f0; background:#fff; border-radius:8px; cursor:pointer; color:#475569; transition:all 0.2s; }
    .chat-msg .suggest-replies button:hover { background:#f1f5f9; border-color:#94a3b8; }
    .chat-input-area { padding:1rem 1.25rem; background:#fff; border-top:1px solid #e2e8f0; }
    .chat-input-area form { display:flex; gap:0.6rem; align-items:flex-end; }
    .chat-input-area input { flex:1; padding:0.75rem 1rem; border:1px solid #e2e8f0; border-radius:10px; font-size:0.95rem; font-family:inherit; }
    .chat-input-area input:focus { outline:none; border-color:#0f172a; }
    .chat-input-area button { padding:0.75rem 1.2rem; background:linear-gradient(135deg,#0f172a,#1e293b); color:#fff; border:none; border-radius:10px; font-weight:600; cursor:pointer; font-size:0.9rem; }
    .chat-input-area button:hover { opacity:0.9; }
    .chat-input-area button:disabled { opacity:0.5; cursor:not-allowed; }
    .typing { font-size:0.85rem; color:#64748b; font-style:italic; padding:0.5rem 0; }
    .video-link { display:inline-block; margin-top:0.5rem; padding:0.4rem 0.8rem; background:#f0fdf4; color:#059669; border-radius:8px; font-size:0.85rem; text-decoration:none; }
    .location-link { display:inline-block; margin-top:0.5rem; padding:0.4rem 0.8rem; background:#eff6ff; color:#2563eb; border-radius:8px; font-size:0.85rem; text-decoration:none; }
  </style>
</head>
<body>
  <div class="chat-header">{{ tenant.name }}</div>
  <div class="chat-messages" id="messages">
    <div class="chat-msg assistant">
      Merhaba! {{ tenant.name }} size nasıl yardımcı olabilir? Sorularınızı yazabilirsiniz.
    </div>
  </div>
  <div class="chat-input-area">
    <form id="chat-form" onsubmit="return sendMessage(event)">
      <input type="text" id="msg-input" placeholder="Mesajınızı yazın..." autocomplete="off">
      <button type="submit" id="send-btn">Gönder</button>
    </form>
  </div>

  <script>
    const API_BASE = "{{ api_base }}";
    const TENANT_SLUG = "{{ tenant_slug }}";
    const VISITOR_KEY = "asistan_web_visitor_" + TENANT_SLUG;
    let visitorId = localStorage.getItem(VISITOR_KEY);
    if (!visitorId) {
      visitorId = "web-" + crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2));
      localStorage.setItem(VISITOR_KEY, visitorId);
    }

    function scrollBottom() {
      const el = document.getElementById("messages");
      if (el) el.scrollTop = el.scrollHeight;
    }

    function addUserMessage(text) {
      const container = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "chat-msg user";
      div.textContent = text;
      container.appendChild(div);
      scrollBottom();
    }

    function addAssistantMessage(data) {
      const container = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "chat-msg assistant";
      let html = "";
      if (data.text) html += "<div style='white-space:pre-wrap'>" + escapeHtml(data.text) + "</div>";
      if (data.image_url) {
        html += "<div class='product-img'><img src='" + escapeHtml(data.image_url) + "' alt='' loading='lazy'>";
        if (data.image_caption) html += "<div class='caption'>" + escapeHtml(data.image_caption) + "</div>";
        html += "</div>";
      }
      (data.product_images || []).forEach(function(p) {
        html += "<div class='product-img'><img src='" + escapeHtml(p.url || "") + "' alt='' loading='lazy'>";
        if (p.name || p.price) html += "<div class='caption'>" + escapeHtml(p.name || "") + (p.price ? " - " + p.price + " TL" : "") + "</div>";
        html += "</div>";
      });
      (data.videos || []).forEach(function(v) {
        html += "<a href='" + escapeHtml(v.url || "#") + "' target='_blank' rel='noopener' class='video-link'>▶ " + (v.caption || "Video") + "</a> ";
      });
      if (data.location && data.location.maps_url) {
        html += "<a href='" + escapeHtml(data.location.maps_url) + "' target='_blank' rel='noopener' class='location-link'>📍 Konum</a>";
      } else if (data.location && data.location.lat && data.location.lng) {
        const url = "https://maps.google.com/?q=" + data.location.lat + "," + data.location.lng;
        html += "<a href='" + escapeHtml(url) + "' target='_blank' rel='noopener' class='location-link'>📍 Konum</a>";
      }
      if (data.suggest_replies && data.suggest_replies.length) {
        html += "<div class='suggest-replies'>";
        data.suggest_replies.forEach(function(r) {
          html += "<button type='button' onclick='clickReply(\"" + escapeHtml(r).replace(/"/g, "&quot;") + "\")'>" + escapeHtml(r) + "</button>";
        });
        html += "</div>";
      }
      div.innerHTML = html || "<div>Yanıt alınamadı.</div>";
      container.appendChild(div);
      scrollBottom();
    }

    function escapeHtml(s) {
      if (!s) return "";
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function clickReply(text) {
      document.getElementById("msg-input").value = text;
      sendMessage(new Event("submit"));
    }

    async function sendMessage(e) {
      e && e.preventDefault();
      const input = document.getElementById("msg-input");
      const btn = document.getElementById("send-btn");
      const text = (input.value || "").trim();
      if (!text) return false;

      input.value = "";
      addUserMessage(text);
      btn.disabled = true;

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.textContent = "Yazıyor...";
      document.getElementById("messages").appendChild(typing);
      scrollBottom();

      try {
        const res = await fetch(API_BASE + "/api/chat/web", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            tenant_slug: TENANT_SLUG,
            visitor_id: visitorId,
            message: text,
          }),
        });
        typing.remove();
        if (!res.ok) {
          const err = await res.json().catch(function() { return { detail: res.statusText }; });
          addAssistantMessage({ text: "Üzgünüz, bir hata oluştu: " + (err.detail || res.statusText) });
        } else {
          const data = await res.json();
          addAssistantMessage(data);
        }
      } catch (err) {
        typing.remove();
        addAssistantMessage({ text: "Bağlantı hatası. Lütfen tekrar deneyin." });
      }
      btn.disabled = false;
      return false;
    }
  </script>
</body>
</html>
